name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".trivyignore"
      - ".github/workflows/web-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".trivyignore"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION:                  us-east-1
  S3_BUCKET:                   minibinders-1781915805
  CLOUDFRONT_DISTRIBUTION_ID:  ELPO2GDDMVXIL

jobs:
  # ── 1. Lint & security scan ────────────────────────────────────────────────
  scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      # ── ESLint (code quality + React rules) ───────────────────────────────
      - name: ESLint
        run: npm run lint
        working-directory: web

      # ── npm audit (OWASP A06 — known CVEs in npm deps) ────────────────────
      - name: npm audit — dependency CVEs
        run: npm audit --audit-level=high --omit=dev
        working-directory: web

      # ── Semgrep SAST (XSS, injection, OWASP top-10 for JS/TS) ────────────
      - name: Semgrep — SAST
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config=p/typescript \
            --config=p/react \
            --config=p/owasp-top-ten \
            --error \
            --quiet \
            web/src/

      # ── Trivy filesystem scan (secrets + vuln in node_modules) ────────────
      - name: Trivy — filesystem scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:      fs
          scan-ref:       web/
          format:         table
          severity:       HIGH,CRITICAL
          exit-code:      "1"
          ignore-unfixed: true
          trivyignores:   .trivyignore

  # ── 2. Build & deploy (main branch only) ──────────────────────────────────
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      # VITE_API_BASE_URL is a repository variable (not secret) set in
      # Settings → Secrets and variables → Actions → Variables.
      # Example value: https://d5j3l1rgzmla.cloudfront.net
      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Hashed assets (JS/CSS bundles) get long-lived cache; index.html never cached.
      - name: Sync dist/ to S3
        run: |
          aws s3 sync web/dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp web/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
