name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     730335203321.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:   minibinders-repo
  ECS_CLUSTER:      minibinders-cluster
  ECS_SERVICE:      minibinders
  TASK_DEFINITION:  minibinders
  CONTAINER_NAME:   minibinders

jobs:
  # ── 1. Code quality & static security ──────────────────────────────────────
  scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + tooling
        run: |
          pip install -r backend/requirements.txt
          pip install ruff bandit pip-audit

      # ── Ruff (lint + code quality) ────────────────────────────────────────
      - name: Ruff — lint
        run: ruff check backend/ --config backend/ruff.toml

      # ── Bandit (OWASP SAST — Python) ──────────────────────────────────────
      # Blocks on HIGH severity findings; reports MEDIUM as warnings via SARIF.
      - name: Bandit — SAST (block on HIGH)
        run: |
          pip install bandit[sarif]
          bandit -r backend/ \
            --severity-level high \
            --confidence-level medium \
            --exclude backend/pipeline \
            -f sarif -o bandit-results.sarif || BANDIT_EXIT=$?
          bandit -r backend/ \
            --severity-level high \
            --confidence-level medium \
            --exclude backend/pipeline \
            -f txt
          exit ${BANDIT_EXIT:-0}

      - name: Upload Bandit SARIF
        if: always() && hashFiles('bandit-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      # ── pip-audit (OWASP A06 — known CVEs in dependencies) ────────────────
      - name: pip-audit — dependency CVEs
        run: pip-audit -r backend/requirements.txt --strict

  # ── 2. Build image + Trivy scan ────────────────────────────────────────────
  build:
    name: Build & Image Scan
    runs-on: ubuntu-latest
    needs: scan
    # Build on every push/PR but only push to ECR on main
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" -f Dockerfile .
          echo "image=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ── Trivy (container image CVE scan — OWASP A06) ──────────────────────
      # Table format: human-readable log output + blocks on HIGH/CRITICAL.
      - name: Trivy — image scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.build.outputs.image }}
          format:         table
          severity:       HIGH,CRITICAL
          exit-code:      "1"
          ignore-unfixed: true
          trivyignores:   .trivyignore

      # SARIF format: upload to GitHub Security tab (no-block — SARIF uses
      # vendor-adjusted severity which can differ from the table scan above).
      - name: Trivy — generate SARIF for Security tab
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.build.outputs.image }}
          format:         sarif
          output:         trivy-results.sarif
          severity:       HIGH,CRITICAL
          exit-code:      "0"
          ignore-unfixed: true
          trivyignores:   .trivyignore

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # ── Push to ECR (main branch only, after clean scan) ──────────────────
      - name: Push image to ECR
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG="${{ steps.build.outputs.image }}"
          docker tag "$IMAGE_TAG" \
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker push "$IMAGE_TAG"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"

  # ── 3. Deploy to ECS (main branch only) ────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:        ${{ steps.task-def.outputs.task-definition }}
          service:                ${{ env.ECS_SERVICE }}
          cluster:                ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
