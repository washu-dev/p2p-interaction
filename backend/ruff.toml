line-length = 125

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (basic security)
    "UP",  # pyupgrade
]
ignore = [
    "S101",  # assert — acceptable in FastAPI dependencies
    "S603",  # subprocess without shell=True — intentional in runner.py
    "S607",  # partial executable path — intentional in sbatch calls
    "B008",  # FastAPI Depends()/File()/Form() in function signatures — standard pattern
    "S110",  # try-except-pass — intentional reconnect suppression in sshconn.py
]

[lint.per-file-ignores]
"backend/pipeline/*.py" = ["S", "B", "E501"]   # HPC helper scripts — shell calls and long lines are intentional
